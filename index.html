<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Mean Reversion Scanner</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#06060f;--bg2:#0d0d1a;--bg3:#12122a;
  --border:#1e1e35;--text:#e2e2f0;--muted:#7a7a9a;--muted2:#5a5a7a;
  --purple:#7c6af7;--green:#34d399;--red:#f87171;--yellow:#fbbf24;--blue:#60a5fa;
  --buy-bg:rgba(52,211,153,0.08);--sell-bg:rgba(248,113,113,0.08);
  --neutral-bg:rgba(30,30,53,0.6);--caution-bg:rgba(251,191,36,0.05);
}
body{background:var(--bg);color:var(--text);font-family:Tahoma,Geneva,sans-serif;font-size:13px;padding:14px;}
/* ── HEADER ── */
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:12px;border-bottom:2px solid var(--border);flex-wrap:wrap;gap:10px;}
.logo-text{font-size:20px;font-weight:700;color:var(--purple);letter-spacing:.04em;}
.logo-sub{font-size:11px;color:var(--muted2);margin-top:2px;font-weight:700;}
.hright{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.dot{width:10px;height:10px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s infinite;flex-shrink:0;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.5;}}
.api-status{font-size:11px;font-weight:700;color:var(--muted);}
.api-status.ok{color:var(--green);}
.api-status.err{color:var(--red);}
.loading-msg{font-size:11px;color:var(--muted);min-height:16px;}
.refresh-btn{background:var(--bg3);border:1px solid var(--border);color:var(--purple);padding:5px 12px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:700;}
.refresh-btn:hover{background:var(--purple);color:#fff;}
/* ── COUNTS ── */
.counts{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap;}
.count-pill{background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:4px 14px;font-size:11px;font-weight:700;cursor:pointer;}
.count-pill.active{background:var(--purple);border-color:var(--purple);color:#fff;}
.count-pill span{margin-left:5px;color:var(--yellow);}
/* ── TABLE ── */
.tbl-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--border);}
table{width:100%;border-collapse:collapse;min-width:860px;}
th{background:var(--bg3);color:var(--muted);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:9px 12px;text-align:left;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:2;}
th:first-child{min-width:200px;}
th.r{text-align:right;}
td{padding:8px 12px;border-bottom:1px solid var(--border);vertical-align:middle;}
td:first-child{min-width:200px;}
tr:last-child td{border-bottom:none;}
tr.buy-row{background:var(--buy-bg);}
tr.sell-row{background:var(--sell-bg);}
tr.neutral-row{background:transparent;}
tr.caution-row{background:var(--caution-bg);}
tr:hover td{background:rgba(124,106,247,.07);}
/* ── SYM CELL ── */
.sym-cell{display:flex;align-items:center;gap:8px;flex-wrap:nowrap;min-width:160px;}
.sym{font-weight:700;font-size:13px;letter-spacing:.03em;}
.sym-link{font-weight:700;font-size:14px;letter-spacing:.03em;color:#fff;text-decoration:none;white-space:nowrap;}
.sym-link:hover{color:var(--purple);}
.chart-btn{display:inline-flex;align-items:center;gap:3px;background:var(--purple);color:#fff;border-radius:5px;padding:3px 9px;font-size:11px;font-weight:700;text-decoration:none;white-space:nowrap;flex-shrink:0;transition:background .15s;}
.chart-btn:hover{background:#5d4de0;}
.sym-name{font-size:11px;color:var(--muted);margin-top:2px;white-space:nowrap;}
.sig-badge{font-size:9px;font-weight:700;border-radius:3px;padding:1px 5px;}
.sig-badge.buy{background:rgba(52,211,153,.25);color:var(--green);}
.sig-badge.sell{background:rgba(248,113,113,.25);color:var(--red);}
/* ── VALUE CELLS ── */
.r{text-align:right;}
.pos{color:var(--green);}
.neg{color:var(--red);}
.neu{color:var(--muted);}
.score-badge{font-size:11px;font-weight:700;border-radius:4px;padding:2px 8px;display:inline-block;}
.score-badge.sb{background:rgba(52,211,153,.15);color:var(--green);}
.score-badge.ss{background:rgba(248,113,113,.15);color:var(--red);}
.score-badge.sn{background:rgba(30,30,53,.8);color:var(--muted);}
.play-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;display:inline-block;white-space:nowrap;}
.play-badge.calls{background:rgba(52,211,153,.15);color:var(--green);border:1px solid rgba(52,211,153,.3);}
.play-badge.puts{background:rgba(248,113,113,.15);color:var(--red);border:1px solid rgba(248,113,113,.3);}
.play-badge.wait{background:rgba(30,30,53,.8);color:var(--muted);border:1px solid var(--border);}
.bb-lower{color:var(--green);}
.bb-upper{color:var(--red);}
.bb-mid{color:var(--muted);}
.ma-above{color:var(--green);}
.ma-below{color:var(--red);}
/* ── MOBILE CARDS ── */
.cards{display:none;gap:10px;flex-direction:column;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px;}
.card.buy-row{border-left:3px solid var(--green);}
.card.sell-row{border-left:3px solid var(--red);}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.card-sym{font-weight:700;font-size:15px;}
.card-name{font-size:10px;color:var(--muted);margin-top:2px;}
.card-price{font-weight:700;font-size:15px;text-align:right;}
.card-chg{font-size:12px;text-align:right;margin-top:2px;}
.card-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;font-size:11px;}
.card-lbl{color:var(--muted);margin-bottom:2px;}
.card-val{font-weight:700;}
.card-chart-btn{display:inline-block;background:var(--purple);color:#fff;border-radius:5px;padding:3px 10px;font-size:11px;font-weight:700;text-decoration:none;margin-top:8px;}
/* ── LOADING ROW ── */
.loading-row td{text-align:center;padding:24px;color:var(--muted);font-style:italic;}
@media(max-width:680px){
  .tbl-wrap{display:none;}
  .cards{display:flex;}
}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="logo-text">📊 Mean Reversion Scanner</div>
    <div class="logo-sub">RSI · Bollinger Bands · 200 EMA</div>
  </div>
  <div class="hright">
    <div class="dot" id="dot"></div>
    <div class="api-status" id="apiStatus">Loading…</div>
    <div class="loading-msg" id="loadingMsg"></div>
    <button class="refresh-btn" onclick="fullLoad()">⟳ Refresh</button>
  </div>
</div>

<div class="counts" id="counts"></div>

<div class="tbl-wrap">
  <table>
    <thead>
      <tr>
        <th>Ticker</th>
        <th class="r">Price</th>
        <th class="r">Chg%</th>
        <th class="r">RSI</th>
        <th>BB Position</th>
        <th>200 EMA</th>
        <th class="r">Score</th>
        <th>Play</th>
      </tr>
    </thead>
    <tbody id="tableBody">
      <tr class="loading-row"><td colspan="8">Loading scanner…</td></tr>
    </tbody>
  </table>
</div>
<div class="cards" id="cardsContainer"></div>

<script>
// ── PROXY ──
const PROXY='https://corsproxy.io/?url=';

// ── STOCK UNIVERSE ──
const STOCKS=[
  // Large Cap Tech
  {s:'AAPL',name:'Apple'},
  {s:'MSFT',name:'Microsoft'},
  {s:'NVDA',name:'NVIDIA'},
  {s:'AMD',name:'AMD'},

  // Healthcare

  {s:'PFE',name:'Pfizer'},
  {s:'ABBV',name:'AbbVie'},
  {s:'LLY',name:'Eli Lilly'},
  // Energy
  {s:'XOM',name:'ExxonMobil'},
  {s:'CVX',name:'Chevron'},
  {s:'OXY',name:'Occidental'},
  // Consumer/Retail
  {s:'WMT',name:'Walmart'},
  {s:'COST',name:'Costco'},
  {s:'HD',name:'Home Depot'},
  {s:'KO',name:'Coca-Cola'},
  {s:'PG',name:'Procter & Gamble'},
  {s:'PM',name:'Philip Morris'},
  // More stocks
  {s:'PLTR',name:'Palantir'},
  {s:'COIN',name:'Coinbase'},
  {s:'SOFI',name:'SoFi'},
  {s:'MARA',name:'Marathon Digital'},
  {s:'ARM',name:'ARM Holdings'},
  {s:'CRWD',name:'CrowdStrike'},
  {s:'HOOD',name:'Robinhood'},
  {s:'SMCI',name:'Super Micro'},
  {s:'UBER',name:'Uber'},
  {s:'APLD',name:'Applied Digital'},
  {s:'SOUN',name:'SoundHound'},
  // ETFs
  {s:'SPY',name:'S&P 500 ETF'},
  {s:'QQQ',name:'Nasdaq ETF'},
  {s:'IWM',name:'Russell 2000 ETF'},
  {s:'TLT',name:'20yr Treasury ETF'},
  {s:'XLF',name:'Financials ETF'},
  {s:'XLE',name:'Energy ETF'},
  {s:'XLV',name:'Healthcare ETF'},
  {s:'GDX',name:'Gold Miners ETF'},
  {s:'ARKK',name:'ARK Innovation ETF'},
  {s:'SLV',name:'Silver ETF'},
  {s:'IBIT',name:'iShares Bitcoin ETF'},
  // Additional
  {s:'BRK-B',name:'Berkshire Hathaway'},
  {s:'V',name:'Visa'},
  {s:'MA',name:'Mastercard'},
  {s:'GOOG',name:'Alphabet Class C'},
  {s:'TMUS',name:'T-Mobile'},
  {s:'CSCO',name:'Cisco'},
  {s:'BAM',name:'Brookfield Asset Mgmt'},
];

let allResults=[];
let priceInterval=null;
let currentFilter='all';

// ── TRADINGVIEW URL ──
// Uses MAExp (Exponential) for the 200 EMA
function tvUrl(sym){
  return `https://www.tradingview.com/chart/?symbol=${encodeURIComponent(sym)}&interval=D&studies=RSI%40tv-basicstudies%2CBB%40tv-basicstudies%2CMAExp%40tv-basicstudies`;
}

// ── RSI CALC ──
function calcRSI(closes,period=14){
  if(closes.length<period+1) return null;
  let gains=0,losses=0;
  for(let i=closes.length-period;i<closes.length;i++){
    const d=closes[i]-closes[i-1];
    if(d>0) gains+=d; else losses-=d;
  }
  let ag=gains/period,al=losses/period;
  for(let i=closes.length-period+1;i<closes.length;i++){
    const d=closes[i]-closes[i-1];
    const g=d>0?d:0,l=d<0?-d:0;
    ag=(ag*(period-1)+g)/period;
    al=(al*(period-1)+l)/period;
  }
  if(al===0) return 100;
  return 100-(100/(1+ag/al));
}

// ── EMA CALC (200-day) ──
function calcEMA(closes,period=200){
  if(closes.length<period) return null;
  const k=2/(period+1);
  let ema=closes.slice(0,period).reduce((a,b)=>a+b,0)/period;
  for(let i=period;i<closes.length;i++) ema=closes[i]*k+ema*(1-k);
  return ema;
}

// ── BOLLINGER BANDS ──
function calcBB(closes,period=20,stdMult=2){
  if(closes.length<period) return null;
  const sl=closes.slice(-period);
  const mean=sl.reduce((a,b)=>a+b,0)/period;
  const variance=sl.reduce((a,b)=>a+(b-mean)**2,0)/period;
  const std=Math.sqrt(variance);
  return{upper:mean+stdMult*std,mid:mean,lower:mean-stdMult*std};
}

// ── FETCH INDICATORS (2yr history) ──
async function fetchIndicators(stock){
  try{
    const url=`https://query1.finance.yahoo.com/v8/finance/chart/${stock.s}?interval=1d&range=2y`;
    const res=await fetch(PROXY+encodeURIComponent(url));
    const json=await res.json();
    const result=json?.chart?.result?.[0];
    if(!result) return{rsi:null,bb:null,bbPos:null,ma200:null,ma200Above:null,pctFromMA:null};
    const closes=result.indicators?.quote?.[0]?.close?.filter(v=>v!=null)??[];
    if(closes.length<20) return{rsi:null,bb:null,bbPos:null,ma200:null,ma200Above:null,pctFromMA:null};
    const rsi=calcRSI(closes);
    const bb=calcBB(closes);
    const ma200=calcEMA(closes,200);
    let bbPos=null;
    const lastClose=closes[closes.length-1];
    if(bb){
      const range=bb.upper-bb.lower;
      const pct=(lastClose-bb.lower)/range;
      if(pct<=0.1) bbPos='lower';
      else if(pct<=0.35) bbPos='near-lower';
      else if(pct<=0.65) bbPos='mid';
      else if(pct<=0.9) bbPos='near-upper';
      else bbPos='upper';
    }
    const ma200Above=ma200!==null?lastClose>ma200:null;
    const pctFromMA=ma200!==null?((lastClose-ma200)/ma200*100):null;
    return{rsi,bb,bbPos,ma200,ma200Above,pctFromMA};
  }catch{
    return{rsi:null,bb:null,bbPos:null,ma200:null,ma200Above:null,pctFromMA:null};
  }
}

// ── FETCH PRICES — batch via Yahoo Finance quote endpoint ──
// Gets all prices in a small number of requests instead of one per stock
async function fetchAllPrices(){
  const map={};
  const syms=STOCKS.map(s=>s.s);
  // Split into batches of 20
  const batchSize=20;
  for(let b=0;b<syms.length;b+=batchSize){
    const batch=syms.slice(b,b+batchSize);
    const joined=batch.join('%2C');
    try{
      const url=`https://query1.finance.yahoo.com/v7/finance/quote?symbols=${joined}&fields=regularMarketPrice,regularMarketChangePercent`;
      const res=await fetch(PROXY+encodeURIComponent(url));
      const json=await res.json();
      const quotes=json?.quoteResponse?.result||[];
      quotes.forEach(q=>{
        const price=q.regularMarketPrice||0;
        const chg=q.regularMarketChangePercent||0;
        if(price>0) map[q.symbol]={price,chg};
      });
    }catch{}
    // Small pause between batches to avoid rate limit
    if(b+batchSize<syms.length) await new Promise(r=>setTimeout(r,400));
  }
  // Fallback: for any missing, try individual chart fetch
  const missing=syms.filter(s=>!map[s]);
  for(const sym of missing){
    try{
      const url=`https://query2.finance.yahoo.com/v8/finance/chart/${sym}?interval=1d&range=5d`;
      const res=await fetch(PROXY+encodeURIComponent(url));
      const json=await res.json();
      const meta=json?.chart?.result?.[0]?.meta||{};
      const price=meta.regularMarketPrice||0;
      const prev=meta.chartPreviousClose||meta.previousClose||0;
      const chg=prev>0?((price-prev)/prev*100):0;
      if(price>0) map[sym]={price,chg};
    }catch{}
    await new Promise(r=>setTimeout(r,200));
  }
  return map;
}

// ── SCORE ──
function scoreStock(r){
  let s=0;
  if(r.rsi!==null){
    if(r.rsi<25) s+=3; else if(r.rsi<30) s+=2; else if(r.rsi<35) s+=1;
    else if(r.rsi>75) s-=3; else if(r.rsi>70) s-=2; else if(r.rsi>65) s-=1;
  }
  if(r.bbPos==='lower') s+=2; else if(r.bbPos==='near-lower') s+=1;
  else if(r.bbPos==='upper') s-=2; else if(r.bbPos==='near-upper') s-=1;
  if(r.ma200Above===true) s+=1; else if(r.ma200Above===false) s-=1;
  return s;
}

// ── LABELS ──
function getScoreLabel(score){
  if(score>=5) return{label:'Strong Buy',cls:'pos',rowCls:'buy-row'};
  if(score>=3) return{label:'Buy',cls:'pos',rowCls:'buy-row'};
  if(score>0)  return{label:'Lean Buy',cls:'pos',rowCls:'buy-row'};
  if(score===0)return{label:'Neutral',cls:'neu',rowCls:'neutral-row'};
  if(score>=-2)return{label:'Lean Sell',cls:'neg',rowCls:'sell-row'};
  if(score>=-4)return{label:'Sell',cls:'neg',rowCls:'sell-row'};
  return{label:'Strong Sell',cls:'neg',rowCls:'sell-row'};
}
function getPlay(score,ma200Above){
  if(score>=3) return{txt: ma200Above===false?'📞 Buy Calls (Below 200MA)':'📞 Buy Calls',cls:'calls'};
  if(score>=1) return{txt:'📞 Lean Calls',cls:'calls'};
  if(score<=-3) return{txt:'🔴 Buy Puts',cls:'puts'};
  if(score<=-1) return{txt:'🔴 Lean Puts',cls:'puts'};
  return{txt:'⏳ Wait',cls:'wait'};
}
function bbLabel(pos){
  const m={lower:'🟢 Lower Band','near-lower':'Near Lower',mid:'Middle','near-upper':'Near Upper',upper:'🔴 Upper Band'};
  return m[pos]||'—';
}
function bbClass(pos){
  if(pos==='lower'||pos==='near-lower') return 'bb-lower';
  if(pos==='upper'||pos==='near-upper') return 'bb-upper';
  return 'bb-mid';
}

// ── FILTER ──
function filterData(data){
  if(currentFilter==='buy') return data.filter(r=>r.score>=1);
  if(currentFilter==='sell') return data.filter(r=>r.score<=-1);
  if(currentFilter==='neutral') return data.filter(r=>r.score===0);
  return data;
}

// ── UPDATE COUNTS ──
function updateCounts(data){
  const buys=data.filter(r=>r.score>=1).length;
  const sells=data.filter(r=>r.score<=-1).length;
  const neut=data.filter(r=>r.score===0).length;
  const pills=[
    {key:'all',label:'All',count:data.length},
    {key:'buy',label:'🟢 Buy Signals',count:buys},
    {key:'sell',label:'🔴 Sell Signals',count:sells},
    {key:'neutral',label:'⏳ Neutral',count:neut},
  ];
  document.getElementById('counts').innerHTML=pills.map(p=>`
    <div class="count-pill${currentFilter===p.key?' active':''}" onclick="setFilter('${p.key}')">
      ${p.label}<span>${p.count}</span>
    </div>`).join('');
}
function setFilter(f){currentFilter=f;const s=[...allResults].sort((a,b)=>b.score-a.score);renderTable(s);renderCards(s);updateCounts(s);}

// ── RENDER TABLE ──
function renderTable(data){
  const visible=filterData(data);
  const tbody=document.getElementById('tableBody');
  if(!visible.length){
    tbody.innerHTML='<tr class="loading-row"><td colspan="8">No stocks match this filter.</td></tr>';
    return;
  }
  let html='';
  visible.forEach(r=>{
    const {label,cls,rowCls}=getScoreLabel(r.score);
    const {txt:pt,cls:pc}=getPlay(r.score,r.ma200Above);
    const pf=r.price>0?'$'+r.price.toFixed(2):'—';
    const cf=r.price>0?(r.chg>=0?'+':'')+r.chg.toFixed(2)+'%':'—';
    const cc=r.chg<0?'neg':r.chg>0?'pos':'neu';
    const rsiF=r.rsi!==null?r.rsi.toFixed(1):'—';
    const rsiC=r.rsi!==null?(r.rsi<30?'pos':r.rsi>70?'neg':'neu'):'neu';
    const sb=r.score>=4?'<span class="sig-badge buy">BUY</span>':r.score<=-4?'<span class="sig-badge sell">SELL</span>':'';
    const maF=r.ma200!==null?'$'+r.ma200.toFixed(2):'—';
    const maPct=r.pctFromMA!==null?(r.pctFromMA>=0?'+':'')+r.pctFromMA.toFixed(1)+'%':'';
    const maClass=r.ma200Above===true?'ma-above':r.ma200Above===false?'ma-below':'neu';
    const url=tvUrl(r.s);
    html+=`<tr class="${rowCls}">
      <td>
        <div class="sym-cell">
          <a class="sym-link" href="${url}" target="_blank" rel="noopener">${r.s}</a>${sb}
          <a class="chart-btn" href="${url}" target="_blank" rel="noopener">📈 Chart</a>
        </div>
        <div class="sym-name">${r.name}</div>
      </td>
      <td class="r">${pf}</td>
      <td class="r ${cc}">${cf}</td>
      <td class="r ${rsiC}">${rsiF}</td>
      <td class="${bbClass(r.bbPos)}">${bbLabel(r.bbPos)}</td>
      <td class="${maClass}">${maF} <small>${maPct}</small></td>
      <td class="r"><span class="score-badge ${r.score>0?'sb':r.score<0?'ss':'sn'}">${r.score>=0?'+':''}${r.score} · ${label}</span></td>
      <td><span class="play-badge ${pc}">${pt}</span></td>
    </tr>`;
  });
  tbody.innerHTML=html;
}

// ── RENDER MOBILE CARDS ──
function renderCards(data){
  const visible=filterData(data);
  const container=document.getElementById('cardsContainer');
  let html='';
  visible.forEach(r=>{
    const {rowCls}=getScoreLabel(r.score);
    const {txt:pt,cls:pc}=getPlay(r.score,r.ma200Above);
    const pf=r.price>0?'$'+r.price.toFixed(2):'—';
    const cf=r.price>0?(r.chg>=0?'+':'')+r.chg.toFixed(2)+'%':'—';
    const cc=r.chg<0?'neg':r.chg>0?'pos':'neu';
    const rsiF=r.rsi!==null?r.rsi.toFixed(1):'—';
    const rsiC=r.rsi!==null?(r.rsi<30?'pos':r.rsi>70?'neg':'neu'):'neu';
    const maF=r.ma200!==null?'$'+r.ma200.toFixed(2):'—';
    const maPct=r.pctFromMA!==null?(r.pctFromMA>=0?'+':'')+r.pctFromMA.toFixed(1)+'%':'';
    const maClass=r.ma200Above===true?'ma-above':r.ma200Above===false?'ma-below':'neu';
    const url=tvUrl(r.s);
    html+=`<div class="card ${rowCls}">
      <div class="card-top">
        <div>
          <div class="card-sym"><a class="sym-link" href="${url}" target="_blank" rel="noopener">${r.s}</a></div>
          <div class="card-name">${r.name}</div>
        </div>
        <div>
          <div class="card-price">${pf}</div>
          <div class="card-chg ${cc}">${cf}</div>
        </div>
      </div>
      <div class="card-grid">
        <div><div class="card-lbl">RSI</div><div class="card-val ${rsiC}">${rsiF}</div></div>
        <div><div class="card-lbl">BB</div><div class="card-val ${bbClass(r.bbPos)}">${bbLabel(r.bbPos)}</div></div>
        <div><div class="card-lbl">200 EMA</div><div class="card-val ${maClass}">${maF} ${maPct}</div></div>
      </div>
      <div style="margin-top:8px;display:flex;align-items:center;gap:8px;">
        <span class="play-badge ${pc}">${pt}</span>
        <a class="card-chart-btn" href="${url}" target="_blank" rel="noopener">📈 Chart</a>
      </div>
    </div>`;
  });
  container.innerHTML=html||'<div style="color:var(--muted);text-align:center;padding:20px;">No stocks match this filter.</div>';
}

// ── FULL LOAD ──
async function fullLoad(){
  // Keep existing data visible while we reload — never blank the table
  const prevResults=[...allResults];
  const freshResults=[];

  if(priceInterval){clearInterval(priceInterval);priceInterval=null;}
  document.getElementById('dot').style.background='var(--yellow)';
  document.getElementById('apiStatus').textContent=prevResults.length?'Refreshing…':'Loading…';
  document.getElementById('apiStatus').className='api-status';

  // STEP 1: Load all indicators into freshResults (shadow array)
  // Table keeps showing prevResults until enough fresh data accumulates
  for(let i=0;i<STOCKS.length;i++){
    document.getElementById('loadingMsg').textContent=`Indicators ${i+1}/${STOCKS.length}: ${STOCKS[i].s}…`;
    const ind=await fetchIndicators(STOCKS[i]);

    // Carry over existing price so the row never shows "—" during reload
    const prev=prevResults.find(p=>p.s===STOCKS[i].s);
    const r={
      ...STOCKS[i],...ind,
      price: prev?prev.price:0,
      chg:   prev?prev.chg:0,
      pctFromMA: prev?prev.pctFromMA:null,
    };
    // Recalculate pctFromMA with carried price and fresh EMA
    if(r.ma200!==null&&r.price>0){
      r.pctFromMA=((r.price-r.ma200)/r.ma200*100);
      r.ma200Above=r.price>r.ma200;
    }
    r.score=scoreStock(r);
    freshResults.push(r);

    // Show progress every 5 stocks using freshResults merged over prevResults
    if(i%5===4||i===STOCKS.length-1){
      // Merge: show fresh entries + any remaining prev entries not yet replaced
      const merged=STOCKS.map(st=>{
        const f=freshResults.find(x=>x.s===st.s);
        return f||(prevResults.find(x=>x.s===st.s)||null);
      }).filter(Boolean);
      const sorted=merged.sort((a,b)=>b.score-a.score);
      renderTable(sorted);renderCards(sorted);updateCounts(sorted);
    }
    if(i<STOCKS.length-1) await new Promise(r=>setTimeout(r,350));
  }

  // STEP 2: Load all prices — update freshResults in place
  document.getElementById('loadingMsg').textContent='Loading prices…';
  const priceMap=await fetchAllPrices();
  for(let i=0;i<freshResults.length;i++){
    const u=priceMap[freshResults[i].s];
    if(u&&u.price>0){
      freshResults[i].price=u.price;
      freshResults[i].chg=u.chg;
      if(freshResults[i].ma200!==null){
        freshResults[i].pctFromMA=((u.price-freshResults[i].ma200)/freshResults[i].ma200*100);
        freshResults[i].ma200Above=u.price>freshResults[i].ma200;
      }
      freshResults[i].score=scoreStock(freshResults[i]);
    }
  }

  // Now swap in fully loaded data
  allResults=freshResults;

  document.getElementById('loadingMsg').textContent='';
  document.getElementById('apiStatus').textContent=`✓ Live · ${STOCKS.length} stocks`;
  document.getElementById('apiStatus').className='api-status ok';
  document.getElementById('dot').style.background='var(--green)';

  const sorted=[...allResults].sort((a,b)=>b.score-a.score);
  renderTable(sorted);renderCards(sorted);updateCounts(sorted);

  // STEP 3: Price-only refresh every 60s — ONLY writes if new price > 0, never blanks
  priceInterval=setInterval(async()=>{
    if(!allResults.length) return;
    const map=await fetchAllPrices();
    let changed=false;
    for(let i=0;i<allResults.length;i++){
      const u=map[allResults[i].s];
      if(u&&u.price>0){
        allResults[i].price=u.price;
        allResults[i].chg=u.chg;
        if(allResults[i].ma200!==null){
          allResults[i].pctFromMA=((u.price-allResults[i].ma200)/allResults[i].ma200*100);
          allResults[i].ma200Above=u.price>allResults[i].ma200;
        }
        allResults[i].score=scoreStock(allResults[i]);
        changed=true;
      }
    }
    if(changed){
      const sorted=[...allResults].sort((a,b)=>b.score-a.score);
      renderTable(sorted);renderCards(sorted);updateCounts(sorted);
    }
  },60000);

  // Refresh indicators every 6 hours
  setTimeout(fullLoad,6*60*60*1000);
}

// ── START ──
fullLoad();
</script>
