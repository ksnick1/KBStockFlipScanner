<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Mean Reversion Scanner</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#06060f;--bg2:#0d0d1a;--bg3:#12122a;
  --border:#1e1e35;--text:#e2e2f0;--muted:#7a7a9a;--muted2:#5a5a7a;
  --purple:#7c6af7;--green:#34d399;--red:#f87171;--yellow:#fbbf24;
}
body{background:var(--bg);color:var(--text);font-family:Tahoma,Geneva,sans-serif;font-size:13px;padding:14px;}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:12px;border-bottom:2px solid var(--border);flex-wrap:wrap;gap:10px;}
.logo-text{font-size:20px;font-weight:700;color:var(--purple);}
.logo-sub{font-size:11px;color:var(--muted2);margin-top:2px;font-weight:700;}
.hright{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.dot{width:10px;height:10px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s infinite;flex-shrink:0;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.api-status{font-size:11px;font-weight:700;color:var(--muted);}
.api-status.ok{color:var(--green);}
.loading-msg{font-size:11px;color:var(--muted);min-height:16px;}
.refresh-btn{background:var(--bg3);border:1px solid var(--border);color:var(--purple);padding:5px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:700;}
.refresh-btn:hover{background:var(--purple);color:#fff;}
.counts{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.count-pill{background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:4px 14px;font-size:11px;font-weight:700;cursor:pointer;user-select:none;}
.count-pill.active{background:var(--purple);border-color:var(--purple);color:#fff;}
.count-pill span{margin-left:5px;color:var(--yellow);}
.tbl-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--border);}
table{width:100%;border-collapse:collapse;min-width:920px;}
th{background:var(--bg3);color:var(--muted);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:10px 14px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;}
th.r{text-align:right;}
td{padding:9px 14px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr.buy-row{background:rgba(52,211,153,.07);}
tr.sell-row{background:rgba(248,113,113,.07);}
tr:hover td{background:rgba(124,106,247,.08);}

/* ── TICKER CELL ── */
.tcol{min-width:230px;width:230px;}
.twrap{display:flex;align-items:center;gap:0;margin-bottom:3px;}
.tsym{
  font-weight:700;font-size:14px;letter-spacing:.04em;color:#fff;
  text-decoration:none;background:rgba(124,106,247,.18);
  border:1px solid rgba(124,106,247,.4);border-radius:6px 0 0 6px;
  padding:4px 11px;white-space:nowrap;display:inline-block;
  transition:background .15s;
}
.tsym:hover{background:var(--purple);}
.tchart{
  display:inline-block;background:var(--purple);color:#fff;
  font-size:11px;font-weight:700;text-decoration:none;
  padding:4px 10px;border-radius:0 6px 6px 0;
  border:1px solid var(--purple);border-left:none;
  white-space:nowrap;transition:background .15s;
}
.tchart:hover{background:#5d4de0;}
.tname{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:225px;}
.sbuy{font-size:9px;font-weight:700;border-radius:3px;padding:1px 5px;background:rgba(52,211,153,.25);color:var(--green);margin-left:4px;}
.ssell{font-size:9px;font-weight:700;border-radius:3px;padding:1px 5px;background:rgba(248,113,113,.25);color:var(--red);margin-left:4px;}

.r{text-align:right;}
.pos{color:var(--green);}
.neg{color:var(--red);}
.neu{color:var(--muted);}
.scb{font-size:11px;font-weight:700;border-radius:4px;padding:2px 8px;display:inline-block;white-space:nowrap;}
.scb.sb{background:rgba(52,211,153,.15);color:var(--green);}
.scb.ss{background:rgba(248,113,113,.15);color:var(--red);}
.scb.sn{background:rgba(30,30,53,.9);color:var(--muted);}
.pb{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;display:inline-block;white-space:nowrap;}
.pb.calls{background:rgba(52,211,153,.15);color:var(--green);border:1px solid rgba(52,211,153,.3);}
.pb.puts{background:rgba(248,113,113,.15);color:var(--red);border:1px solid rgba(248,113,113,.3);}
.pb.wait{background:rgba(30,30,53,.9);color:var(--muted);border:1px solid var(--border);}
.bbl{color:var(--green);}
.bbu{color:var(--red);}
.bbm{color:var(--muted);}
.maa{color:var(--green);}
.mab{color:var(--red);}
.loading-row td{text-align:center;padding:28px;color:var(--muted);font-style:italic;}

/* MOBILE CARDS */
.cards{display:none;gap:10px;flex-direction:column;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px;}
.card.buy-row{border-left:3px solid var(--green);}
.card.sell-row{border-left:3px solid var(--red);}
.ctop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.csym{font-weight:700;font-size:16px;}
.csym a{color:#fff;text-decoration:none;}
.csym a:hover{color:var(--purple);}
.cname{font-size:10px;color:var(--muted);margin-top:2px;}
.cprice{font-weight:700;font-size:15px;text-align:right;}
.cchg{font-size:12px;text-align:right;margin-top:2px;}
.cgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;font-size:11px;}
.clbl{color:var(--muted);margin-bottom:2px;}
.cval{font-weight:700;}
.cbot{margin-top:10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.cchart{display:inline-block;background:var(--purple);color:#fff;border-radius:5px;padding:4px 12px;font-size:11px;font-weight:700;text-decoration:none;}
@media(max-width:700px){.tbl-wrap{display:none;}.cards{display:flex;}}
</style>

function sleep(ms){ return new Promise(function(r){setTimeout(r,ms);}); }

function tvUrl(sym){
  return 'https://www.tradingview.com/chart/?symbol=' + encodeURIComponent(sym)
    + '&interval=D&studies=RSI%40tv-basicstudies%2CBB%40tv-basicstudies%2CMAExp%40tv-basicstudies';
}

/* ── DUAL-PROXY FETCH ── */
async function proxyFetch(rawUrl){
  for(var pi=0;pi<PROXIES.length;pi++){
    try{
      var res = await fetch(PROXIES[pi]+encodeURIComponent(rawUrl), {signal:AbortSignal.timeout(9000)});
      if(res && res.ok) return res;
    }catch(e){}
  }
  return null;
}

/* ── MATH ── */
function calcRSI(c,p){
  p=p||14;
  if(c.length<p+1) return null;
  var g=0,l=0,i,d;
  for(i=c.length-p;i<c.length;i++){d=c[i]-c[i-1];if(d>0)g+=d;else l-=d;}
  var ag=g/p,al=l/p;
  for(i=c.length-p+1;i<c.length;i++){
    d=c[i]-c[i-1];
    ag=(ag*(p-1)+(d>0?d:0))/p;
    al=(al*(p-1)+(d<0?-d:0))/p;
  }
  return al===0?100:100-100/(1+ag/al);
}

function calcEMA(c,p){
  p=p||200;
  if(c.length<p) return null;
  var k=2/(p+1),ema=0,i;
  for(i=0;i<p;i++) ema+=c[i];
  ema/=p;
  for(i=p;i<c.length;i++) ema=c[i]*k+ema*(1-k);
  return ema;
}

function calcBB(c,p){
  p=p||20;
  if(c.length<p) return null;
  var sl=c.slice(-p),mean=0,i;
  for(i=0;i<sl.length;i++) mean+=sl[i];
  mean/=p;
  var v=0;
  for(i=0;i<sl.length;i++) v+=(sl[i]-mean)*(sl[i]-mean);
  var std=Math.sqrt(v/p);
  return{upper:mean+2*std,mid:mean,lower:mean-2*std};
}

/* ── FETCH ONE STOCK'S INDICATORS ── */
async function fetchOneInd(sym){
  var blank={rsi:null,bb:null,bbPos:null,ma200:null,ma200Above:null,pctFromMA:null,lastClose:null,lastChg:0};
  try{
    var url='https://query1.finance.yahoo.com/v8/finance/chart/'+sym+'?interval=1d&range=2y';
    var res=await proxyFetch(url);
    if(!res) return blank;
    var json=await res.json();
    var result=json&&json.chart&&json.chart.result&&json.chart.result[0];
    if(!result) return blank;
    var raw=(result.indicators&&result.indicators.quote&&result.indicators.quote[0]&&result.indicators.quote[0].close)||[];
    var closes=raw.filter(function(v){return v!=null;});
    if(closes.length<20) return blank;
    var rsi=calcRSI(closes);
    var bb=calcBB(closes);
    var ma200=calcEMA(closes,200);
    var last=closes[closes.length-1];
    var bbPos=null;
    if(bb){
      var pct=(last-bb.lower)/(bb.upper-bb.lower);
      bbPos=pct<=0.1?'lower':pct<=0.35?'near-lower':pct<=0.65?'mid':pct<=0.9?'near-upper':'upper';
    }
    var ma200Above=ma200!==null?last>ma200:null;
    var pctFromMA=ma200!==null?(last-ma200)/ma200*100:null;
    // Also capture last close price and daily change from the historical data
    var prevClose=closes.length>1?closes[closes.length-2]:null;
    var lastChg=prevClose&&prevClose>0?(last-prevClose)/prevClose*100:0;
    return{rsi:rsi,bb:bb,bbPos:bbPos,ma200:ma200,ma200Above:ma200Above,pctFromMA:pctFromMA,lastClose:last,lastChg:lastChg};
  }catch(e){return blank;}
}

/* ── PARALLEL INDICATOR FETCH (5 concurrent) ── */
async function fetchAllIndicators(onProgress){
  var results=new Array(STOCKS.length).fill(null);
  var next=0; var done=0;
  async function worker(){
    while(next<STOCKS.length){
      var i=next++;
      results[i]=await fetchOneInd(STOCKS[i].s);
      done++;
      onProgress(done,i,STOCKS[i].s,results[i]);
    }
  }
  var workers=[];
  for(var w=0;w<5;w++) workers.push(worker());
  await Promise.all(workers);
  return results;
}

/* ── BATCH PRICE FETCH ── */
async function fetchAllPrices(){
  var map={};
  var syms=STOCKS.map(function(s){return s.s;});
  var i,b,batch,url,res,json,q;
  for(b=0;b<syms.length;b+=20){
    batch=syms.slice(b,b+20).join(',');
    url='https://query1.finance.yahoo.com/v7/finance/quote?symbols='+encodeURIComponent(batch)+'&fields=regularMarketPrice,regularMarketChangePercent';
    try{
      res=await proxyFetch(url);
      if(res){
        json=await res.json();
        var quotes=(json&&json.quoteResponse&&json.quoteResponse.result)||[];
        for(i=0;i<quotes.length;i++){
          q=quotes[i];
          if(q.regularMarketPrice>0) map[q.symbol]={price:q.regularMarketPrice,chg:q.regularMarketChangePercent||0};
        }
      }
    }catch(e){}
    if(b+20<syms.length) await sleep(300);
  }
  // Fallback for missing
  var missing=syms.filter(function(s){return !map[s];});
  for(i=0;i<missing.length;i++){
    try{
      res=await proxyFetch('https://query2.finance.yahoo.com/v8/finance/chart/'+missing[i]+'?interval=1d&range=5d');
      if(res){
        json=await res.json();
        var meta=(json&&json.chart&&json.chart.result&&json.chart.result[0]&&json.chart.result[0].meta)||{};
        var price=meta.regularMarketPrice||0;
        var prev=meta.chartPreviousClose||meta.previousClose||0;
        if(price>0) map[missing[i]]={price:price,chg:prev>0?(price-prev)/prev*100:0};
      }
    }catch(e){}
    await sleep(150);
  }
  return map;
}

/* ── SCORING ── */
function scoreStock(r){
  var s=0;
  if(r.rsi!==null){
    if(r.rsi<25)s+=3;else if(r.rsi<30)s+=2;else if(r.rsi<35)s+=1;
    else if(r.rsi>75)s-=3;else if(r.rsi>70)s-=2;else if(r.rsi>65)s-=1;
  }
  if(r.bbPos==='lower')s+=2;else if(r.bbPos==='near-lower')s+=1;
  else if(r.bbPos==='upper')s-=2;else if(r.bbPos==='near-upper')s-=1;
  if(r.ma200Above===true)s+=1;else if(r.ma200Above===false)s-=1;
  return s;
}

function getScoreLabel(sc){
  if(sc>=5)  return{label:'Strong Buy', rc:'buy-row', bc:'sb'};
  if(sc>=3)  return{label:'Buy',        rc:'buy-row', bc:'sb'};
  if(sc>0)   return{label:'Lean Buy',   rc:'buy-row', bc:'sb'};
  if(sc===0) return{label:'Neutral',    rc:'',        bc:'sn'};
  if(sc>=-2) return{label:'Lean Sell',  rc:'sell-row',bc:'ss'};
  if(sc>=-4) return{label:'Sell',       rc:'sell-row',bc:'ss'};
  return          {label:'Strong Sell', rc:'sell-row',bc:'ss'};
}

function getPlay(sc,ma200Above){
  var below=(ma200Above===false)?' (Below 200MA)':'';
  if(sc>=3) return{txt:'&#128222; Buy Calls'+below,cls:'calls'};
  if(sc>=1) return{txt:'&#128222; Lean Calls',cls:'calls'};
  if(sc<=-3)return{txt:'&#128308; Buy Puts',cls:'puts'};
  if(sc<=-1)return{txt:'&#128308; Lean Puts',cls:'puts'};
  return{txt:'&#9203; Watch',cls:'wait'};
}

function bbLabel(pos){
  var m={lower:'&#128994; Lower Band','near-lower':'Near Lower',mid:'Middle','near-upper':'Near Upper',upper:'&#128308; Upper Band'};
  return m[pos]||'&mdash;';
}
function bbCls(pos){
  return(pos==='lower'||pos==='near-lower')?'bbl':(pos==='upper'||pos==='near-upper')?'bbu':'bbm';
}

/* ── FILTER ── */
function filterData(data){
  if(currentFilter==='buy') return data.filter(function(r){return r.score>=1;});
  if(currentFilter==='sell')return data.filter(function(r){return r.score<=-1;});
  if(currentFilter==='neutral')return data.filter(function(r){return r.score===0;});
  return data;
}

function setFilter(f){
  currentFilter=f;
  displaySorted();
}

/* ── COUNTS ── */
function updateCounts(data){
  var buys=data.filter(function(r){return r.score>=1;}).length;
  var sells=data.filter(function(r){return r.score<=-1;}).length;
  var neut=data.filter(function(r){return r.score===0;}).length;
  var pills=[
    {key:'all',label:'All',count:data.length},
    {key:'buy',label:'&#127802; Buy Signals',count:buys},
    {key:'sell',label:'&#128308; Sell Signals',count:sells},
    {key:'neutral',label:'&#9203; Neutral',count:neut},
  ];
  var html='';
  for(var i=0;i<pills.length;i++){
    var p=pills[i];
    html+='<div class="count-pill'+(currentFilter===p.key?' active':'')+'" onclick="setFilter(\''+p.key+'\')">'
      +p.label+'<span>'+p.count+'</span></div>';
  }
  document.getElementById('counts').innerHTML=html;
}

/* ── RENDER TABLE ── */
function renderTable(data){
  var visible=filterData(data);
  var tbody=document.getElementById('tableBody');
  if(!visible.length){
    tbody.innerHTML='<tr class="loading-row"><td colspan="8">No stocks match this filter.</td></tr>';
    return;
  }
  var rows=[];
  for(var i=0;i<visible.length;i++){
    var r=visible[i];
    var sl=getScoreLabel(r.score);
    var pl=getPlay(r.score,r.ma200Above);
    var pf=r.price>0?('$'+r.price.toFixed(2)):'&mdash;';
    var pfLabel=r.price>0?pf+' <small style="color:var(--muted);font-size:9px;font-weight:normal;">CLOSE</small>':pf;
    var cf=r.price>0?((r.chg>=0?'+':'')+r.chg.toFixed(2)+'%'):'&mdash;';
    var cc=r.chg<0?'neg':r.chg>0?'pos':'neu';
    var rf=r.rsi!==null?r.rsi.toFixed(1):'&mdash;';
    var rc=r.rsi!==null?(r.rsi<30?'pos':r.rsi>70?'neg':'neu'):'neu';
    var mf=r.ma200!==null?('$'+r.ma200.toFixed(2)):'&mdash;';
    var mp=r.pctFromMA!==null?((r.pctFromMA>=0?'+':'')+r.pctFromMA.toFixed(1)+'%'):'';
    var mc=r.ma200Above===true?'maa':r.ma200Above===false?'mab':'neu';
    var sc=r.score>=0?'+'+r.score:''+r.score;
    var sb=r.score>=4?'<span class="sbuy">BUY</span>':r.score<=-4?'<span class="ssell">SELL</span>':'';
    var url=tvUrl(r.s);

    rows.push(
      '<tr class="'+sl.rc+'">'
      +'<td class="tcol">'
        +'<div class="twrap">'
          +'<a class="tsym" href="'+url+'" target="_blank" rel="noopener">'+r.s+'</a>'
          +'<a class="tchart" href="'+url+'" target="_blank" rel="noopener">&#128200; Chart</a>'
        +'</div>'
        +'<div class="tname">'+r.name+sb+'</div>'
      +'</td>'
      +'<td class="r">'+pfLabel+'</td>'
      +'<td class="r '+cc+'">'+cf+'</td>'
      +'<td class="r '+rc+'">'+rf+'</td>'
      +'<td class="'+bbCls(r.bbPos)+'">'+bbLabel(r.bbPos)+'</td>'
      +'<td class="'+mc+'">'+mf+' <small>'+mp+'</small></td>'
      +'<td class="r"><span class="scb '+sl.bc+'">'+sc+' &middot; '+sl.label+'</span></td>'
      +'<td><span class="pb '+pl.cls+'">'+pl.txt+'</span></td>'
      +'</tr>'
    );
  }
  tbody.innerHTML=rows.join('');
}

/* ── RENDER CARDS ── */
function renderCards(data){
  var visible=filterData(data);
  var container=document.getElementById('cardsContainer');
  if(!visible.length){
    container.innerHTML='<div style="color:var(--muted);text-align:center;padding:20px;">No stocks match this filter.</div>';
    return;
  }
  var cards=[];
  for(var i=0;i<visible.length;i++){
    var r=visible[i];
    var sl=getScoreLabel(r.score);
    var pl=getPlay(r.score,r.ma200Above);
    var pf=r.price>0?('$'+r.price.toFixed(2)):'&mdash;';
    var cf=r.price>0?((r.chg>=0?'+':'')+r.chg.toFixed(2)+'%'):'&mdash;';
    var cc=r.chg<0?'neg':r.chg>0?'pos':'neu';
    var rf=r.rsi!==null?r.rsi.toFixed(1):'&mdash;';
    var rc=r.rsi!==null?(r.rsi<30?'pos':r.rsi>70?'neg':'neu'):'neu';
    var mf=r.ma200!==null?('$'+r.ma200.toFixed(2)):'&mdash;';
    var mp=r.pctFromMA!==null?((r.pctFromMA>=0?'+':'')+r.pctFromMA.toFixed(1)+'%'):'';
    var mc=r.ma200Above===true?'maa':r.ma200Above===false?'mab':'neu';
    var url=tvUrl(r.s);
    cards.push(
      '<div class="card '+sl.rc+'">'
      +'<div class="ctop">'
        +'<div><div class="csym"><a href="'+url+'" target="_blank" rel="noopener">'+r.s+'</a></div><div class="cname">'+r.name+'</div></div>'
        +'<div><div class="cprice">'+pf+'</div><div class="cchg '+cc+'">'+cf+'</div></div>'
      +'</div>'
      +'<div class="cgrid">'
        +'<div><div class="clbl">RSI</div><div class="cval '+rc+'">'+rf+'</div></div>'
        +'<div><div class="clbl">BB</div><div class="cval '+bbCls(r.bbPos)+'">'+bbLabel(r.bbPos)+'</div></div>'
        +'<div><div class="clbl">200 EMA</div><div class="cval '+mc+'">'+mf+' '+mp+'</div></div>'
      +'</div>'
      +'<div class="cbot">'
        +'<span class="pb '+pl.cls+'">'+pl.txt+'</span>'
        +'<a class="cchart" href="'+url+'" target="_blank" rel="noopener">&#128200; Open Chart</a>'
      +'</div>'
      +'</div>'
    );
  }
  container.innerHTML=cards.join('');
}

function displaySorted(){
  var s=[].concat(allResults).sort(function(a,b){return b.score-a.score;});
  renderTable(s);renderCards(s);updateCounts(s);
}

/* ── MAIN LOAD ── */
async function startLoad(){
  var prevResults=[].concat(allResults);
  allResults=[];

  if(priceInterval){clearInterval(priceInterval);priceInterval=null;}
  var dotEl=document.getElementById('dot');
  dotEl.style.cssText='width:10px;height:10px;border-radius:50%;background:var(--yellow);box-shadow:0 0 8px var(--yellow);flex-shrink:0;';
  document.getElementById('apiStatus').textContent=prevResults.length?'Refreshing\u2026':'Loading\u2026';
  document.getElementById('apiStatus').className='api-status';

  // Show old data while we reload
  if(prevResults.length){
    var ps=[].concat(prevResults).sort(function(a,b){return b.score-a.score;});
    renderTable(ps);renderCards(ps);updateCounts(ps);
  }

  // STEP 1: Indicators, 5 parallel
  await fetchAllIndicators(function(done,idx,sym,ind){
    document.getElementById('loadingMsg').textContent='Indicators '+done+'/'+STOCKS.length+': '+sym;
    var prev=null;
    for(var pi=0;pi<prevResults.length;pi++){if(prevResults[pi].s===sym){prev=prevResults[pi];break;}}
    var r=Object.assign({},STOCKS[idx],ind,{
      price:prev?prev.price:(ind.lastClose||0),
      chg:  prev?prev.chg:(ind.lastChg||0),
      pctFromMA:prev?prev.pctFromMA:null
    });
    if(r.ma200!==null&&r.price>0){
      r.pctFromMA=(r.price-r.ma200)/r.ma200*100;
      r.ma200Above=r.price>r.ma200;
    }
    r.score=scoreStock(r);
    var ei=-1;
    for(var ei2=0;ei2<allResults.length;ei2++){if(allResults[ei2].s===sym){ei=ei2;break;}}
    if(ei>=0)allResults[ei]=r;else allResults.push(r);

    if(done%3===0||done===STOCKS.length){
      // Merge fresh + remaining prev
      var merged=STOCKS.map(function(st){
        for(var j=0;j<allResults.length;j++){if(allResults[j].s===st.s)return allResults[j];}
        for(var k=0;k<prevResults.length;k++){if(prevResults[k].s===st.s)return prevResults[k];}
        return null;
      }).filter(function(x){return x!==null;});
      merged.sort(function(a,b){return b.score-a.score;});
      renderTable(merged);renderCards(merged);updateCounts(merged);
    }
  });

  // Ensure all stocks in allResults
  for(var si=0;si<STOCKS.length;si++){
    var found=false;
    for(var ri=0;ri<allResults.length;ri++){if(allResults[ri].s===STOCKS[si].s){found=true;break;}}
    if(!found){
      var r2=Object.assign({},STOCKS[si],{rsi:null,bb:null,bbPos:null,ma200:null,ma200Above:null,pctFromMA:null,price:0,chg:0});
      r2.score=scoreStock(r2);
      allResults.push(r2);
    }
  }

  // STEP 2: Prices
  document.getElementById('loadingMsg').textContent='Loading prices\u2026';
  var priceMap=await fetchAllPrices();
  for(var pi2=0;pi2<allResults.length;pi2++){
    var u=priceMap[allResults[pi2].s];
    if(u&&u.price>0){
      allResults[pi2].price=u.price;allResults[pi2].chg=u.chg;
      if(allResults[pi2].ma200!==null){
        allResults[pi2].pctFromMA=(u.price-allResults[pi2].ma200)/allResults[pi2].ma200*100;
        allResults[pi2].ma200Above=u.price>allResults[pi2].ma200;
      }
      allResults[pi2].score=scoreStock(allResults[pi2]);
    }
  }

  document.getElementById('loadingMsg').textContent='';
  document.getElementById('apiStatus').textContent='\u2713 Live \u00b7 '+STOCKS.length+' stocks';
  document.getElementById('apiStatus').className='api-status ok';
  dotEl.style.cssText='width:10px;height:10px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s infinite;flex-shrink:0;';

  displaySorted();

  // STEP 3: Price refresh every 60s — never blanks
  priceInterval=setInterval(async function(){
    if(!allResults.length) return;
    var map=await fetchAllPrices();
    var changed=false;
    for(var i=0;i<allResults.length;i++){
      var u2=map[allResults[i].s];
      if(u2&&u2.price>0){
        allResults[i].price=u2.price;allResults[i].chg=u2.chg;
        if(allResults[i].ma200!==null){
          allResults[i].pctFromMA=(u2.price-allResults[i].ma200)/allResults[i].ma200*100;
          allResults[i].ma200Above=u2.price>allResults[i].ma200;
        }
        allResults[i].score=scoreStock(allResults[i]);
        changed=true;
      }
    }
    if(changed) displaySorted();
  },60000);

  setTimeout(startLoad,6*60*60*1000);
}

startLoad();
</script>
